<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0F172A">
<meta name="description" content="نظام ناسج الذكي — خط إنتاج الأمد من تحليل الاحتياج إلى تجربة WebXR في 7 أيام. نموذج أولي تفاعلي ببيانات توضيحية.">
<title>نظام ناسج الذكي — الأمد</title>
<style>
/* ==========================================================
   NASEJ-PROTO-01 — الهوية البصرية v26 — قيم إلزامية حصراً
   ========================================================== */
:root {
  /* Deep Space Blue — الخلفية الأساسية */
  --space-darkest: #0C1222;
  --space-base:    #0F172A;
  --space-light:   #4B515F;
  --space-vlight:  #93979F;
  /* Electric Purple — اللون الرئيسي */
  --purple-darkest: #632EBE;
  --purple-base:    #7C3AED;
  --purple-light:   #9D6BF2;
  --purple-vlight:  #C4A6F7;
  /* Sunrise Gold — الإنجاز والاعتماد */
  --gold-darkest: #C47E09;
  --gold-base:    #F59E0B;
  --gold-light:   #F8B648;
  --gold-vlight:  #FAD391;
  /* Plasma Cyan — البيانات */
  --cyan-base: #22D3EE;

  --font-ar: "Orleen","IBM Plex Sans Arabic","Tajawal",system-ui,sans-serif;
  --font-en: "Giga Sans","Inter",system-ui,sans-serif;
  --ease: cubic-bezier(.4,0,.2,1);
}


* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }
@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
}

body {
  background: var(--space-base);
  color: #FFFFFF;
  font-family: var(--font-ar);
  font-size: 16px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  /* الأرقام لاتينية دائماً */
  font-feature-settings: "lnum" 1, "tnum" 0;
  font-variant-numeric: lining-nums;
  overflow-x: hidden;
}
html[lang="en"] body { font-family: var(--font-en); }

/* ---------- هيكل عام ---------- */
.container { width: 100%; max-width: 1200px; margin-inline: auto; padding-inline: 20px; }
section { padding-block: 72px; position: relative; }
.section-title {
  font-size: clamp(1.5rem, 3.5vw, 2.2rem);
  font-weight: 700;
  margin-block-end: 8px;
}
.section-sub {
  color: var(--space-vlight);
  font-size: 1rem;
  margin-block-end: 32px;
  max-width: 720px;
}
.divider {
  height: 1px; border: 0;
  background: linear-gradient(90deg, transparent, var(--space-light), transparent);
  opacity: .4;
}

/* ---------- أزرار ---------- */
button {
  font: inherit; color: inherit; cursor: pointer;
  border: 0; background: none;
  min-height: 44px; min-width: 44px;
  border-radius: 12px;
  transition: background-color .25s var(--ease), color .25s var(--ease),
              box-shadow .25s var(--ease), border-color .25s var(--ease),
              opacity .25s var(--ease), transform .25s var(--ease);
}
button:focus-visible, a:focus-visible, summary:focus-visible {
  outline: 2px solid var(--cyan-base);
  outline-offset: 3px;
  border-radius: 8px;
}
.btn-primary {
  background: linear-gradient(135deg, var(--purple-base), var(--purple-darkest));
  color: #FFFFFF; font-weight: 700; font-size: 1.05rem;
  padding: 14px 32px;
  box-shadow: 0 8px 24px rgba(124, 58, 237, .35);
}
.btn-primary:hover { background: linear-gradient(135deg, var(--purple-light), var(--purple-base)); }
.btn-primary:active { transform: translateY(1px); }
.btn-secondary {
  background: rgba(124, 58, 237, .12);
  border: 1px solid var(--purple-base);
  color: var(--purple-vlight);
  font-weight: 600; padding: 10px 24px;
}
.btn-secondary:hover { background: rgba(124, 58, 237, .25); color: #FFFFFF; }
.btn-ghost {
  border: 1px solid var(--space-light);
  color: var(--space-vlight);
  font-weight: 600; padding: 10px 24px;
}
.btn-ghost:hover { border-color: var(--space-vlight); color: #FFFFFF; }
.btn-gold {
  background: linear-gradient(135deg, var(--gold-base), var(--gold-darkest));
  color: var(--space-darkest); font-weight: 700; padding: 10px 26px;
}
.btn-gold:hover { background: linear-gradient(135deg, var(--gold-light), var(--gold-base)); }
button:disabled { opacity: .45; cursor: not-allowed; }

/* ---------- 1. البطل ---------- */
.hero {
  min-height: 92svh;
  display: flex; flex-direction: column;
  background: radial-gradient(120% 90% at 50% 0%, var(--space-base) 0%, var(--space-darkest) 100%);
  padding-block: 0;
  overflow: hidden;
}
.starfield, .starfield::after {
  content: ""; position: absolute; inset: 0;
  pointer-events: none;
  background-repeat: repeat;
}
.starfield {
  background-image:
    radial-gradient(1.2px 1.2px at 22px 34px, rgba(255,255,255,.8) 50%, transparent 51%),
    radial-gradient(1px 1px at 120px 90px, rgba(255,255,255,.5) 50%, transparent 51%),
    radial-gradient(1.4px 1.4px at 210px 150px, rgba(196,166,247,.7) 50%, transparent 51%),
    radial-gradient(1px 1px at 300px 60px, rgba(255,255,255,.45) 50%, transparent 51%),
    radial-gradient(1.1px 1.1px at 80px 200px, rgba(34,211,238,.55) 50%, transparent 51%),
    radial-gradient(1px 1px at 260px 240px, rgba(255,255,255,.4) 50%, transparent 51%),
    radial-gradient(1.3px 1.3px at 160px 300px, rgba(250,211,145,.55) 50%, transparent 51%),
    radial-gradient(1px 1px at 340px 190px, rgba(255,255,255,.5) 50%, transparent 51%);
  background-size: 380px 340px;
  animation: star-drift 180s linear infinite;
  opacity: .8;
}
.starfield::after {
  background-image:
    radial-gradient(1px 1px at 60px 120px, rgba(255,255,255,.35) 50%, transparent 51%),
    radial-gradient(1px 1px at 180px 40px, rgba(157,107,242,.4) 50%, transparent 51%),
    radial-gradient(1px 1px at 290px 280px, rgba(255,255,255,.3) 50%, transparent 51%);
  background-size: 420px 380px;
  animation: star-drift 240s linear infinite reverse;
}
@keyframes star-drift {
  from { background-position: 0 0; }
  to   { background-position: 0 -680px; }
}
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding-block: 20px;
  position: relative; z-index: 2;
}
.brand-logo { display: block; width: 132px; height: auto; }
.lang-toggle {
  border: 1px solid var(--space-light);
  color: #FFFFFF; font-weight: 700;
  padding: 8px 18px; font-size: .95rem;
  background: rgba(12, 18, 34, .5);
}
.lang-toggle:hover { border-color: var(--purple-light); color: var(--purple-vlight); }
.hero-body {
  flex: 1; display: flex; flex-direction: column; justify-content: center;
  text-align: center; position: relative; z-index: 2;
  padding-block: 48px 72px;
}
.hero-title {
  font-size: clamp(2.2rem, 7vw, 4rem);
  font-weight: 800; line-height: 1.25;
  background: linear-gradient(180deg, #FFFFFF 55%, var(--purple-vlight));
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: #FFFFFF;
}
.hero-tagline {
  font-size: clamp(1.05rem, 2.6vw, 1.4rem);
  color: var(--purple-vlight); font-weight: 600;
  margin-block-start: 12px;
}
.hero-def {
  max-width: 760px; margin: 28px auto 0;
  color: var(--space-vlight); font-size: 1.02rem;
}
.hero-slogan {
  margin: 28px auto 0; max-width: 700px;
  font-size: clamp(1.15rem, 3vw, 1.55rem);
  font-weight: 700; color: var(--gold-light);
}
.hero-cta { margin-block-start: 36px; }

/* ---------- 2. لوحة التجارب ---------- */
.board-grid {
  display: grid; gap: 18px;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
}
.exp-card {
  text-align: start; width: 100%;
  background: linear-gradient(180deg, rgba(12,18,34,.9), rgba(12,18,34,.55));
  border: 1px solid rgba(147, 151, 159, .18);
  border-radius: 16px; padding: 20px;
  display: flex; flex-direction: column; gap: 12px;
  color: #FFFFFF;
}
.exp-card.clickable:hover { border-color: var(--purple-base); box-shadow: 0 8px 28px rgba(124,58,237,.22); }
.exp-code {
  font-family: var(--font-en);
  font-size: .8rem; letter-spacing: .06em;
  color: var(--cyan-base); font-weight: 700;
}
.exp-name { font-size: 1.12rem; font-weight: 700; line-height: 1.4; }
.exp-meta { font-size: .85rem; color: var(--space-vlight); }
.mini-progress { display: flex; gap: 5px; }
.mini-progress span {
  flex: 1; height: 6px; border-radius: 3px;
  background: var(--space-light); opacity: .5;
}
.mini-progress span.done { background: var(--gold-base); opacity: 1; }
.mini-progress span.active { background: var(--purple-base); opacity: 1; }
.exp-status { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: .8rem; font-weight: 700;
  border-radius: 999px; padding: 4px 12px;
}
.badge-gold  { color: var(--gold-light); background: rgba(245, 158, 11, .12); border: 1px solid rgba(245,158,11,.4); }
.badge-purple{ color: var(--purple-vlight); background: rgba(124, 58, 237, .14); border: 1px solid rgba(124,58,237,.45); }
.day-counter { font-size: .85rem; color: var(--space-vlight); white-space: nowrap; }
.day-counter b { color: var(--cyan-base); font-family: var(--font-en); }
.board-hint { margin-block-start: 20px; font-size: .9rem; color: var(--space-vlight); }

/* ---------- 3. خط الإنتاج ---------- */
.time-banner {
  display: inline-flex; align-items: center; gap: 10px;
  background: rgba(124, 58, 237, .14);
  border: 1px solid var(--purple-base);
  color: #FFFFFF; font-weight: 700; font-size: 1.05rem;
  border-radius: 999px; padding: 10px 24px;
  margin-block-end: 36px;
}
.time-banner .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--gold-base); }
.pipeline {
  display: flex; flex-direction: column; gap: 0;
  align-items: stretch;
}
.stage-card {
  background: linear-gradient(180deg, rgba(12,18,34,.92), rgba(12,18,34,.6));
  border: 1px solid rgba(147,151,159,.18);
  border-radius: 16px; padding: 18px;
  flex: 1; min-width: 0;
  transition: border-color .3s var(--ease), box-shadow .3s var(--ease);
}
.stage-card .stage-num {
  font-family: var(--font-en); font-weight: 800; font-size: .8rem;
  color: var(--space-vlight); letter-spacing: .08em;
}
.stage-card .stage-name { font-weight: 700; font-size: .98rem; line-height: 1.45; margin-block-start: 4px; }
.stage-card.st-active { border-color: var(--purple-base); box-shadow: 0 0 0 1px var(--purple-base), 0 10px 30px rgba(124,58,237,.25); }
.stage-card.st-done   { border-color: rgba(245,158,11,.55); }
.stage-card.st-locked { opacity: .55; }
.gate {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 10px 6px; flex: 0 0 auto;
}
.gate-star {
  width: 46px; height: 46px; border-radius: 50%;
  display: grid; place-items: center;
  border: 2px solid var(--space-light);
  background: rgba(12,18,34,.8);
  transition: border-color .3s var(--ease), box-shadow .3s var(--ease);
}
.gate-star svg { width: 24px; height: 24px; display: block; }
.gate-star svg path { fill: var(--space-light); transition: fill .3s var(--ease); }
.gate.g-pending .gate-star { border-color: var(--purple-base); animation: gate-pulse 1.6s var(--ease) infinite; }
.gate.g-pending .gate-star svg path { fill: var(--purple-light); }
.gate.g-approved .gate-star { border-color: var(--gold-base); box-shadow: 0 0 18px rgba(245,158,11,.45); }
.gate.g-approved .gate-star svg path { fill: var(--gold-base); }
@keyframes gate-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(124,58,237,.5); }
  50%      { box-shadow: 0 0 0 9px rgba(124,58,237,0); }
}
.gate-role { font-size: .74rem; font-weight: 700; color: var(--space-vlight); text-align: center; white-space: nowrap; }
.gate.g-approved .gate-role { color: var(--gold-light); }
.gate.g-pending .gate-role { color: var(--purple-vlight); }
.gate-state { font-size: .68rem; color: var(--space-vlight); text-align: center; white-space: nowrap; }
.pipeline-note { margin-block-start: 26px; font-size: .9rem; color: var(--space-vlight); }

@media (min-width: 1024px) {
  .pipeline { flex-direction: row; align-items: center; }
  .gate { flex-direction: column; padding: 0 8px; }
}
@media (max-width: 1023.5px) {
  .pipeline { max-width: 460px; }
  .gate { align-self: center; }
}

/* ---------- 4. رحلة التجربة ---------- */
.journey-head {
  display: flex; flex-wrap: wrap; gap: 16px;
  align-items: center; justify-content: space-between;
  background: linear-gradient(180deg, rgba(12,18,34,.92), rgba(12,18,34,.6));
  border: 1px solid rgba(147,151,159,.18);
  border-radius: 16px; padding: 20px;
  margin-block-end: 20px;
}
.journey-head .exp-code { font-size: .85rem; }
.journey-title-line { font-size: 1.25rem; font-weight: 800; }
.journey-day {
  font-weight: 700; font-size: 1rem; color: #FFFFFF;
  background: rgba(34,211,238,.1); border: 1px solid rgba(34,211,238,.4);
  border-radius: 999px; padding: 8px 18px; white-space: nowrap;
}
.journey-day b { color: var(--cyan-base); font-family: var(--font-en); }
.journey-controls { display: flex; gap: 10px; flex-wrap: wrap; }
.mastery-rule {
  font-size: .88rem; color: var(--space-vlight);
  border-inline-start: 3px solid var(--gold-base);
  padding-inline-start: 12px; margin-block: 18px;
}
.journey-stage-panel {
  background: linear-gradient(180deg, rgba(12,18,34,.92), rgba(12,18,34,.6));
  border: 1px solid rgba(124,58,237,.5);
  border-radius: 16px; padding: 22px;
  margin-block-end: 18px;
}
.journey-stage-head { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-block-end: 14px; }
.journey-stage-name { font-weight: 800; font-size: 1.1rem; }
.agent-strip {
  background: rgba(12,18,34,.85);
  border: 1px solid rgba(34,211,238,.25);
  border-radius: 12px; padding: 14px 16px;
  font-size: .9rem; min-height: 52px;
}
.agent-strip-title {
  font-size: .78rem; font-weight: 700; color: var(--cyan-base);
  letter-spacing: .04em; margin-block-end: 8px;
  display: flex; align-items: center; gap: 8px;
}
.agent-strip-title .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan-base); animation: gate-pulse 1.4s infinite; }
.agent-line { color: var(--space-vlight); line-height: 1.9; }
.agent-line.current { color: #FFFFFF; }
.agent-line .caret {
  display: inline-block; width: 2px; height: 1em;
  background: var(--cyan-base); vertical-align: text-bottom;
  animation: caret-blink 1s steps(1) infinite;
}
@keyframes caret-blink { 50% { opacity: 0; } }
.check-valve { margin-block-start: 16px; }
.check-valve-title { font-size: .78rem; font-weight: 700; color: var(--purple-vlight); letter-spacing: .04em; margin-block-end: 8px; }
.check-list { list-style: none; display: flex; flex-direction: column; gap: 6px; font-size: .9rem; }
.check-list li { display: flex; align-items: center; gap: 10px; color: var(--space-vlight); transition: color .3s var(--ease); }
.check-list li .tick {
  width: 20px; height: 20px; border-radius: 50%;
  border: 1.5px solid var(--space-light);
  display: inline-grid; place-items: center; flex: 0 0 auto;
  font-size: .7rem; color: transparent;
  transition: all .3s var(--ease);
}
.check-list li.ok { color: #FFFFFF; }
.check-list li.ok .tick { border-color: var(--gold-base); background: rgba(245,158,11,.15); color: var(--gold-base); }
.approver-card {
  margin-block-start: 16px;
  border: 1px solid rgba(245,158,11,.45);
  background: rgba(245,158,11,.07);
  border-radius: 12px; padding: 16px;
  display: flex; flex-wrap: wrap; gap: 14px; align-items: center; justify-content: space-between;
}
.approver-role { font-weight: 800; font-size: 1rem; color: var(--gold-light); }
.approver-sub { font-size: .85rem; color: var(--space-vlight); }
.approver-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.audit-log {
  margin-block-start: 22px;
  background: rgba(12,18,34,.85);
  border: 1px solid rgba(147,151,159,.18);
  border-radius: 12px; padding: 16px;
}
.audit-log h3 { font-size: .9rem; color: var(--space-vlight); margin-block-end: 10px; }
.audit-log ul { list-style: none; display: flex; flex-direction: column; gap: 8px; font-size: .86rem; }
.audit-log li { display: flex; gap: 10px; align-items: baseline; color: var(--space-vlight); }
.audit-log li .a-role { color: var(--gold-light); font-weight: 700; white-space: nowrap; }
.audit-log li .a-time { font-family: var(--font-en); color: var(--cyan-base); font-size: .78rem; white-space: nowrap; }
.audit-log li.a-return .a-role { color: var(--purple-vlight); }
.audit-empty { color: var(--space-light); font-size: .85rem; }
.journey-done {
  margin-block-start: 18px; text-align: center;
  border: 1px solid rgba(245,158,11,.5);
  background: rgba(245,158,11,.08);
  border-radius: 16px; padding: 26px;
  font-weight: 800; font-size: 1.15rem; color: var(--gold-light);
}

/* ---------- 5. عمق المخرجات ---------- */
.artifact-panels { display: flex; flex-direction: column; gap: 14px; }
.artifact-panels details {
  background: linear-gradient(180deg, rgba(12,18,34,.92), rgba(12,18,34,.6));
  border: 1px solid rgba(147,151,159,.18);
  border-radius: 16px; overflow: hidden;
}
.artifact-panels summary {
  cursor: pointer; list-style: none;
  padding: 18px 22px; font-weight: 700; font-size: 1.02rem;
  display: flex; align-items: center; gap: 12px;
  min-height: 44px;
}
.artifact-panels summary::-webkit-details-marker { display: none; }
.artifact-panels summary .chev { margin-inline-start: auto; transition: transform .25s var(--ease); color: var(--space-vlight); }
.artifact-panels details[open] summary .chev { transform: rotate(180deg); }
.artifact-panels summary .p-tag {
  font-size: .72rem; font-weight: 800; letter-spacing: .05em;
  color: var(--purple-vlight); background: rgba(124,58,237,.15);
  border-radius: 6px; padding: 3px 9px; font-family: var(--font-en);
}
.artifact-body { padding: 0 22px 22px; }
.kp-card {
  border: 1px solid rgba(34,211,238,.3);
  border-radius: 12px; padding: 18px;
  background: rgba(12,18,34,.85);
  display: flex; flex-direction: column; gap: 10px; font-size: .95rem;
}
.kp-row { display: flex; gap: 10px; flex-wrap: wrap; }
.kp-label { color: var(--cyan-base); font-weight: 700; white-space: nowrap; font-size: .85rem; }
.kp-value { color: #FFFFFF; }
.kp-verbatim {
  border-inline-start: 3px solid var(--cyan-base);
  padding-inline-start: 12px; color: #FFFFFF; line-height: 1.9;
}
.q-card { display: flex; flex-direction: column; gap: 12px; font-size: .95rem; }
.q-text { font-weight: 700; font-size: 1.05rem; line-height: 1.7; }
.q-options { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.q-options li {
  border: 1px solid rgba(147,151,159,.25); border-radius: 10px;
  padding: 10px 14px; color: var(--space-vlight);
}
.q-options li.correct {
  border-color: var(--gold-base); color: #FFFFFF;
  background: rgba(245,158,11,.09);
}
.q-options li .q-fb { display: block; font-size: .82rem; margin-block-start: 4px; color: var(--space-vlight); }
.q-options li.correct .q-fb { color: var(--gold-light); }
.q-tag {
  font-size: .82rem; color: var(--purple-vlight);
  border: 1px dashed rgba(124,58,237,.5); border-radius: 8px; padding: 8px 12px;
}
.valve-compare { display: grid; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
.valve-box {
  border: 1px solid rgba(147,151,159,.25); border-radius: 12px;
  padding: 16px; background: rgba(12,18,34,.85);
  display: flex; flex-direction: column; gap: 12px;
}
.valve-excerpt {
  font-size: .9rem; line-height: 1.9; color: var(--space-vlight);
  border-inline-start: 3px solid var(--space-light); padding-inline-start: 12px;
}
.valve-excerpt em { color: #FFFFFF; font-style: normal; }
.valve-result { font-size: .88rem; font-weight: 700; border-radius: 10px; padding: 10px 14px; display: none; }
.valve-result.show { display: block; }
.valve-result.reject { color: #FFFFFF; background: rgba(124,58,237,.0); border: 1px solid var(--purple-base); background: rgba(99,46,190,.25); }
.valve-result.pass { color: var(--gold-light); border: 1px solid var(--gold-base); background: rgba(245,158,11,.12); }
.valve-note { margin-block-start: 16px; font-size: .88rem; color: var(--space-vlight); }

/* ---------- 6. الاختبار الصارم ---------- */
.tests-head { display: flex; flex-wrap: wrap; align-items: center; gap: 16px; margin-block-end: 24px; }
.tests-counter {
  font-family: var(--font-en); font-weight: 800; font-size: 1.3rem;
  color: var(--cyan-base);
  background: rgba(34,211,238,.08); border: 1px solid rgba(34,211,238,.35);
  border-radius: 12px; padding: 8px 18px;
}
.tests-counter.all-pass { color: var(--gold-base); border-color: rgba(245,158,11,.5); background: rgba(245,158,11,.08); }
.tests-grid {
  display: grid; gap: 12px;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
}
.test-item {
  display: flex; align-items: center; gap: 12px;
  border: 1px solid rgba(147,151,159,.2); border-radius: 12px;
  padding: 12px 16px; font-size: .9rem; color: var(--space-vlight);
  background: rgba(12,18,34,.7);
  transition: all .3s var(--ease);
}
.test-item .tick {
  width: 22px; height: 22px; border-radius: 50%;
  border: 1.5px solid var(--space-light);
  display: inline-grid; place-items: center; flex: 0 0 auto;
  font-size: .72rem; color: transparent;
  transition: all .3s var(--ease);
}
.test-item.ok { color: #FFFFFF; border-color: rgba(245,158,11,.45); }
.test-item.ok .tick { border-color: var(--gold-base); background: rgba(245,158,11,.15); color: var(--gold-base); }
.tests-final { margin-block-start: 22px; font-size: .92rem; color: var(--space-vlight); }
.tests-final code { font-family: var(--font-en); color: var(--cyan-base); font-size: .85rem; }

/* ---------- 7. المؤشرات ---------- */
.kpi-grid {
  display: grid; gap: 16px;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
}
.kpi-card {
  background: linear-gradient(180deg, rgba(12,18,34,.92), rgba(12,18,34,.6));
  border: 1px solid rgba(147,151,159,.18);
  border-radius: 16px; padding: 22px;
  display: flex; flex-direction: column; gap: 8px;
}
.kpi-value {
  font-family: var(--font-en); font-weight: 800;
  font-size: clamp(2rem, 5vw, 2.6rem); line-height: 1.1;
  color: var(--cyan-base);
}
.kpi-card.kpi-goal .kpi-value { color: var(--gold-base); }
.kpi-label { font-size: .92rem; color: #FFFFFF; font-weight: 600; line-height: 1.6; }
.kpi-note { font-size: .82rem; color: var(--space-vlight); }
.kpi-disclaimer { margin-block-start: 20px; font-size: .85rem; color: var(--space-vlight); }

/* ---------- 8. الخاتمة ---------- */
.outro { text-align: center; background: radial-gradient(100% 100% at 50% 100%, var(--space-darkest), var(--space-base)); }
.outro-line { font-size: clamp(1.1rem, 3vw, 1.5rem); font-weight: 700; max-width: 720px; margin-inline: auto; }
.outro-slogan {
  margin-block-start: 20px;
  font-size: clamp(1.6rem, 5vw, 2.4rem); font-weight: 800;
  color: var(--gold-light);
}
footer {
  border-block-start: 1px solid rgba(147,151,159,.15);
  padding-block: 28px; text-align: center;
  font-size: .88rem; color: var(--space-vlight);
}
footer .f-org { color: #FFFFFF; font-weight: 600; }
footer a { color: var(--cyan-base); text-decoration: none; }
footer .honesty {
  margin-block-start: 12px; font-size: .78rem; color: var(--space-light);
}

/* ---------- مؤثرات حية مستمرة ---------- */
/* هالات سديمية بطيئة خلف الأقسام */
section.fx { overflow: hidden; }
section.fx > .container { position: relative; z-index: 1; }
section.fx::before, section.fx::after {
  content: ""; position: absolute; border-radius: 50%;
  width: 54vw; height: 54vw; max-width: 720px; max-height: 720px;
  pointer-events: none; z-index: 0;
}
section.fx::before {
  background: radial-gradient(circle, rgba(124,58,237,.16), transparent 65%);
  top: -18%; inset-inline-start: -14%;
  animation: blob-a 26s ease-in-out infinite alternate;
}
section.fx::after {
  background: radial-gradient(circle, rgba(34,211,238,.10), transparent 65%);
  bottom: -22%; inset-inline-end: -12%;
  animation: blob-b 32s ease-in-out infinite alternate;
}
@keyframes blob-a { to { transform: translate(6%, 12%) scale(1.18); } }
@keyframes blob-b { to { transform: translate(-8%, -8%) scale(1.12); } }

/* شارة البث التوضيحي */
.section-head { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-block-end: 8px; }
.section-head .section-title { margin-block-end: 0; }
.live-chip {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: .78rem; font-weight: 700; color: var(--cyan-base);
  border: 1px solid rgba(34,211,238,.35); background: rgba(34,211,238,.07);
  border-radius: 999px; padding: 5px 14px;
}
.lc-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan-base); animation: dot-pulse 1.6s var(--ease) infinite; }
@keyframes dot-pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,211,238,.5); }
  50%      { opacity: .55; box-shadow: 0 0 0 5px rgba(34,211,238,0); }
}

/* مسح ضوئي دوري على بطاقات التجارب */
.exp-card { position: relative; overflow: hidden; }
.exp-card::before {
  content: ""; position: absolute; top: -25%; bottom: -25%;
  left: -48%; width: 36%; pointer-events: none;
  background: linear-gradient(90deg, transparent, rgba(34,211,238,.07) 42%, rgba(34,211,238,.16) 50%, rgba(34,211,238,.07) 58%, transparent);
  transform: skewX(-18deg) translateX(0);
  animation: card-scan 9s linear infinite;
}
.board-grid .exp-card:nth-child(2)::before { animation-delay: 1.6s; }
.board-grid .exp-card:nth-child(3)::before { animation-delay: 3.2s; }
.board-grid .exp-card:nth-child(4)::before { animation-delay: 4.8s; }
.board-grid .exp-card:nth-child(5)::before { animation-delay: 6.4s; }
@keyframes card-scan {
  0%   { transform: skewX(-18deg) translateX(0); }
  13%  { transform: skewX(-18deg) translateX(470%); }
  100% { transform: skewX(-18deg) translateX(470%); }
}

/* سطر نشاط الوكيل داخل البطاقة */
.exp-ticker {
  display: flex; align-items: center; gap: 8px;
  font-size: .78rem; color: var(--cyan-base); min-height: 1.3em;
}
.exp-ticker .tk-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--cyan-base); flex: 0 0 auto; animation: dot-pulse 1.6s var(--ease) infinite; }
.exp-ticker.tk-awaiting { color: var(--purple-vlight); }
.exp-ticker.tk-awaiting .tk-dot { background: var(--purple-light); }
.exp-ticker.tk-done { color: var(--gold-light); }
.exp-ticker.tk-done .tk-dot { background: var(--gold-base); animation: none; }
.tk-text { transition: opacity .28s var(--ease); }
.tk-text.fade { opacity: 0; }

/* نبض مقطع التقدم النشط */
.mini-progress span.active { animation: seg-pulse 1.8s var(--ease) infinite; }
@keyframes seg-pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 7px rgba(124,58,237,.55); }
  50%      { opacity: .5;  box-shadow: 0 0 1px rgba(124,58,237,.15); }
}

/* تيار البيانات بين مراحل خط الإنتاج */
.flow {
  flex: 0 0 auto; align-self: center; pointer-events: none;
  width: 24px; height: 2px; border-radius: 1px;
  background: repeating-linear-gradient(90deg, rgba(34,211,238,.55) 0 6px, transparent 6px 12px);
  animation: flow-h 1.1s linear infinite;
}
html[dir="rtl"] .flow { animation-direction: reverse; }
@keyframes flow-h { to { background-position: 12px 0; } }
@media (max-width: 1023.5px) {
  .flow {
    width: 2px; height: 22px;
    background: repeating-linear-gradient(180deg, rgba(34,211,238,.55) 0 6px, transparent 6px 12px);
    animation: flow-v 1.1s linear infinite;
  }
  html[dir="rtl"] .flow { animation-direction: normal; }
  @keyframes flow-v { to { background-position: 0 12px; } }
}

/* تنفس البوابات والمرحلة النشطة */
.gate.g-approved .gate-star { animation: gold-breathe 3.4s ease-in-out infinite; }
@keyframes gold-breathe {
  0%, 100% { box-shadow: 0 0 12px rgba(245,158,11,.35); }
  50%      { box-shadow: 0 0 26px rgba(245,158,11,.65); }
}
.stage-card.st-active { animation: st-breathe 2.6s ease-in-out infinite; }
@keyframes st-breathe {
  0%, 100% { box-shadow: 0 0 0 1px var(--purple-base), 0 10px 30px rgba(124,58,237,.22); }
  50%      { box-shadow: 0 0 0 1px var(--purple-light), 0 10px 38px rgba(124,58,237,.42); }
}

/* لمعان دوري لزر البطل */
.hero-cta .btn-primary { position: relative; overflow: hidden; }
.hero-cta .btn-primary::after {
  content: ""; position: absolute; top: 0; bottom: 0;
  left: -60%; width: 40%; pointer-events: none;
  background: linear-gradient(105deg, transparent, rgba(255,255,255,.28), transparent);
  animation: sheen 4.8s var(--ease) infinite;
}
@keyframes sheen {
  0%   { transform: translateX(0); }
  16%  { transform: translateX(450%); }
  100% { transform: translateX(450%); }
}

/* وميض النجوم */
.starfield::after {
  animation: star-drift 240s linear infinite reverse, star-twinkle 6s ease-in-out infinite alternate;
}
@keyframes star-twinkle { from { opacity: .45; } to { opacity: 1; } }
.outro { position: relative; overflow: hidden; }
.outro .container { position: relative; z-index: 1; }

/* خطوط المؤشرات Sparkline */
.spark { width: 100%; height: 34px; display: block; margin-block-start: 4px; }
.spark polyline {
  fill: none; stroke: var(--cyan-base); stroke-width: 2;
  stroke-linecap: round; stroke-linejoin: round; opacity: .85;
}
.kpi-goal .spark polyline { stroke: var(--gold-base); }
.spark-dot { fill: var(--cyan-base); transform-box: fill-box; transform-origin: center; }
.kpi-goal .spark-dot { fill: var(--gold-base); }
@media (prefers-reduced-motion: no-preference) {
  .spark polyline { stroke-dasharray: 240; stroke-dashoffset: 240; }
  .kpi-shown .spark polyline { animation: spark-draw 1.6s var(--ease) forwards; }
  .spark-dot { opacity: 0; }
  .kpi-shown .spark-dot { animation: spark-dot-in .3s 1.3s var(--ease) forwards, dot-scale 2.4s 1.8s ease-in-out infinite; }
}
@keyframes spark-draw { to { stroke-dashoffset: 0; } }
@keyframes spark-dot-in { to { opacity: 1; } }
@keyframes dot-scale { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.6); } }

/* ظهور الأقسام عند التمرير */
@media (prefers-reduced-motion: no-preference) {
  section.reveal { opacity: 0; transform: translateY(18px); transition: opacity .55s var(--ease), transform .55s var(--ease); }
  section.reveal.in { opacity: 1; transform: none; }
}

/* ---------- حركة مخفّضة ---------- */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation: none !important;
    transition-duration: .01ms !important;
  }
  .starfield, .starfield::after { display: none; }
}
</style>

const $ = (s, r) => (r || document).querySelector(s);
const $$ = (s, r) => Array.from((r || document).querySelectorAll(s));

function later(fn, ms) {
  const id = setTimeout(() => { state.timers.delete(id); fn(); }, ms);
  state.timers.add(id);
  return id;
}
function clearTimers() {
  state.timers.forEach(clearTimeout);
  state.timers.clear();
}

}

/* ---------- 2. لوحة التجارب ---------- */
function renderBoard() {
  const grid = $('#boardGrid');
  grid.innerHTML = '';
  DEMO_DATA.experiences.forEach(exp => {
    const el = document.createElement(exp.clickable ? 'button' : 'article');
    el.className = 'exp-card' + (exp.clickable ? ' clickable' : '');
    let bars = '';
    for (let i = 1; i <= 6; i++) {
      bars += `<span class="${i <= exp.done ? 'done' : (i === exp.active ? 'active' : '')}"></span>`;
    }
    let badge;
    if (exp.status === 'complete') badge = `<span class="badge badge-gold">${t('stComplete')}</span>`;
    else if (exp.status === 'awaiting') badge = `<span class="badge badge-purple">${fmt(t('gateAwaiting'), { role: t(exp.roleKey) })}</span>`;
    else badge = `<span class="badge badge-gold">${t('gateApproved')}</span>`;
    const stageInfo = exp.status === 'complete' ? '' : ` | ${fmt(t('stageOf'), { n: exp.active })}`;
    let ticker;
    if (exp.status === 'complete') {
      ticker = `<div class="exp-ticker tk-done"><span class="tk-dot" aria-hidden="true"></span><span class="tk-text">${t('tickerDone')}</span></div>`;
    } else {
      const lines = t('tickers')[exp.code];
      const cls = exp.status === 'awaiting' ? ' tk-awaiting' : '';
      ticker = `<div class="exp-ticker${cls}"><span class="tk-dot" aria-hidden="true"></span><span class="tk-text" data-cycle data-code="${exp.code}">${lines[state.tickerIdx % lines.length]}</span></div>`;
    }
    el.innerHTML =
      `<div class="exp-code">${exp.code}</div>` +
      `<div class="exp-name">${t(exp.nameKey)}</div>` +
      `<div class="exp-meta">${t('sectorLabel')} ${t(exp.sectorKey)} | ${t('deviceLabel')} ${exp.device}${stageInfo}</div>` +
      `<div class="mini-progress" aria-hidden="true">${bars}</div>` +
      ticker +
      `<div class="exp-status">${badge}<span class="day-counter">${fmt(t('dayOf'), { n: `<b>${exp.day}</b>` })}</span></div>`;
    if (exp.clickable) {
      el.addEventListener('click', () => $('#journey').scrollIntoView({ behavior: RM() ? 'auto' : 'smooth' }));
    }
    grid.appendChild(el);
  });
}

/* ---------- 3. خط الإنتاج ---------- */
function gateState(i) {
  if (state.approvedGates[i]) return 'approved';
  if (state.tourStarted && i === state.stage && state.phase === 'awaiting') return 'pending';
  return 'locked';
}
function renderPipeline() {
  const track = $('#pipelineTrack');
  track.innerHTML = '';
  t('stages').forEach((name, i) => {
    const card = document.createElement('div');
    let cls = 'stage-card';
    if (state.approvedGates[i]) cls += ' st-done';
    else if (state.tourStarted && i === state.stage) cls += ' st-active';
    else if (state.tourStarted && i > state.stage) cls += ' st-locked';
    card.className = cls;
    card.innerHTML = `<div class="stage-num">${fmt(t('stageNum'), { n: i + 1 })}</div><div class="stage-name">${name}</div>`;
    track.appendChild(card);

    const g = gateState(i);
    const gate = document.createElement('div');
    gate.className = `gate g-${g}`;
    const stateText = g === 'approved'
      ? `${t('gApproved')} · ${DEMO_DATA.gateDates[i]}`
      : (g === 'pending' ? t('gPending') : t('gLocked'));
    gate.innerHTML =
      `<div class="gate-star" role="img" aria-label="${t('gateTitle')}">${STAR}</div>` +
      `<div class="gate-role">${t(DEMO_DATA.gateRoles[i])}</div>` +
      `<div class="gate-state">${stateText}</div>`;
    const flowIn = document.createElement('div');
    flowIn.className = 'flow';
    flowIn.setAttribute('aria-hidden', 'true');
    track.appendChild(flowIn);
    track.appendChild(gate);
    if (i < 5) {
      const flowOut = document.createElement('div');
      flowOut.className = 'flow';
      flowOut.setAttribute('aria-hidden', 'true');
      track.appendChild(flowOut);
    }
  });
}

  const lines = state.returning ? [t('returnProcessing')] : t('agentLines')[i];
  const linesBox = $('#agentLines');
  // الأسطر المكتملة تظهر فوراً عند استئناف العرض (تبديل لغة مثلاً)
  const doneCount = resume ? Math.min(state.lineIdx, lines.length) : state.lineIdx;
  for (let n = 0; n < doneCount; n++) {
    const div = document.createElement('div');
    div.className = 'agent-line';
    div.textContent = lines[n];
    linesBox.appendChild(div);
  }
  if (state.phase === 'agent') {
    typeLines(lines, doneCount);
  } else {
    showChecks(resume);
  }
}

function typeLines(lines, from) {
  if (from >= lines.length) { state.phase = 'checks'; state.checkIdx = 0; showChecks(false); return; }
  const linesBox = $('#agentLines');
  const div = document.createElement('div');
  div.className = 'agent-line current';
  linesBox.appendChild(div);
  const text = lines[from];
  if (RM()) {
    div.textContent = text;
    div.classList.remove('current');
    state.lineIdx = from + 1;
    typeLines(lines, from + 1);
    return;
  }
  const caret = '<span class="caret" aria-hidden="true"></span>';
  let pos = 0;
  const step = () => {
    pos++;
    div.innerHTML = text.slice(0, pos).replace(/&/g, '&amp;').replace(/</g, '&lt;') + caret;
    if (pos < text.length) later(step, 22);
    else {
      div.textContent = text;
      div.classList.remove('current');
      state.lineIdx = from + 1;
      later(() => typeLines(lines, from + 1), 260);
    }
  };
  later(step, 60);
}

function showChecks(resume) {
  const valve = $('#checkValve');
  const list = $('#checkList');
  valve.hidden = false;
  list.innerHTML = '';
  const items = t('stageChecks')[state.stage];
  items.forEach((label, n) => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="tick" aria-hidden="true">✓</span><span>${label}</span>`;
    if (n < state.checkIdx || state.phase === 'awaiting') li.classList.add('ok');
    list.appendChild(li);
  });
  if (state.phase === 'awaiting') { showApprover(); return; }
  const tick = () => {
    if (state.checkIdx >= items.length) {
      state.phase = 'awaiting';
      showApprover();
      renderPipeline();
      return;
    }
    list.children[state.checkIdx].classList.add('ok');
    state.checkIdx++;
    later(tick, RM() ? 0 : 450);
  };
  later(tick, RM() ? 0 : 350);
}

function showApprover() {
  const st = $('#jStatus');
  if (st) st.hidden = false;
  $('#approverCard').hidden = false;
}

function startTour() {
  if (state.tourStarted) return;
  state.tourStarted = true;
  state.stage = 0;
  state.phase = 'agent';
  state.lineIdx = 0;
  state.checkIdx = 0;
  state.returning = false;
  state.day = 1;
  $('#btnStartTour').disabled = true;
  renderJourneyDay();
  renderPipeline();
  renderJourney(false);
}

function approveStage() {
  if (state.phase !== 'awaiting') return;
  const i = state.stage;
  state.audit.push({
    roleKey: DEMO_DATA.approverRoles[i],
    action: 'approve',
    stageIdx: i,
    time: DEMO_DATA.auditTimes[state.audit.length % DEMO_DATA.auditTimes.length]
  });
  state.approvedGates[i] = true;
  state.returning = false;
  if (i === 5) {
    state.phase = 'done';
    state.day = 7;
  } else {
    state.stage = i + 1;
    state.phase = 'agent';
    state.lineIdx = 0;
    state.checkIdx = 0;
    state.day = i + 2;
  }
  renderJourneyDay();
  renderAudit();
  renderPipeline();
  renderJourney(false);
}

function returnStage() {
  if (state.phase !== 'awaiting') return;
  const i = state.stage;
  state.audit.push({
    roleKey: DEMO_DATA.approverRoles[i],
    action: 'return',
    stageIdx: i,
    time: DEMO_DATA.auditTimes[state.audit.length % DEMO_DATA.auditTimes.length]
  });
  state.returning = true;
  state.phase = 'agent';
  state.lineIdx = 0;
  renderAudit();
  renderPipeline();
  renderJourney(false);
}

function resetTour() {
  clearTimers();
  state.tourStarted = false;
  state.stage = 0;
  state.phase = 'idle';
  state.lineIdx = 0;
  state.checkIdx = 0;
  state.returning = false;
  state.day = 1;
  state.approvedGates = [false, false, false, false, false, false];
  state.audit = [];
  $('#btnStartTour').disabled = false;
  renderJourneyDay();
  renderAudit();
  renderPipeline();
  renderJourney(false);
}

/* ---------- 6. الاختبار الصارم ---------- */
function renderTests(keepState) {
  const grid = $('#testsGrid');
  grid.innerHTML = '';
  t('testItems').forEach((label, n) => {
    const el = document.createElement('div');
    el.className = 'test-item' + (keepState && n < state.testsCount ? ' ok' : '');
    el.innerHTML = `<span class="tick" aria-hidden="true">✓</span><span>${label}</span>`;
    grid.appendChild(el);
  });
  if (!keepState) state.testsCount = 0;
  updateTestsCounter();
}
function updateTestsCounter() {
  const c = $('#testsCounter');
  c.textContent = `${state.testsCount}/11`;
  c.classList.toggle('all-pass', state.testsCount === 11);
}
function runTests() {
  if (state.testsRunning) return;
  state.testsRunning = true;
  state.testsCount = 0;
  renderTests(false);
  /* مؤقّت مستقل عن مؤقّتات الجولة حتى لا يقطعه تبديل اللغة أو إعادة الضبط */
  const step = () => {
    const items = $$('.test-item');
    if (state.testsCount >= items.length) { state.testsRunning = false; return; }
    items[state.testsCount].classList.add('ok');
    state.testsCount++;
    updateTestsCounter();
    setTimeout(step, RM() ? 0 : 280);
  };
  setTimeout(step, RM() ? 0 : 150);
}

/* ---------- 7. المؤشرات ---------- */
function sparkSvg(values) {
  const w = 100, h = 28, pad = 3;
  const min = Math.min(...values), max = Math.max(...values);
  const span = (max - min) || 1;
  const pts = values.map((v, i) => {
    const x = pad + (i / (values.length - 1)) * (w - pad * 2);
    const y = h - pad - ((v - min) / span) * (h - pad * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const last = pts[pts.length - 1].split(',');
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" aria-hidden="true">` +
    `<polyline points="${pts.join(' ')}"></polyline>` +
    `<circle class="spark-dot" cx="${last[0]}" cy="${last[1]}" r="2.6"></circle></svg>`;
}
function renderKpis() {
  const grid = $('#kpiGrid');
  grid.classList.toggle('kpi-shown', state.kpiShown);
  grid.innerHTML = '';
  DEMO_DATA.kpis.forEach((k, n) => {
    const el = document.createElement('div');
    el.className = 'kpi-card' + (k.goal ? ' kpi-goal' : '');
    const shown = state.kpiShown ? k.value : 0;
    el.innerHTML =
      `<div class="kpi-value"><span class="kpi-num" data-target="${k.value}">${shown}</span> <small>${t('kpiUnits')[n]}</small></div>` +
      `<div class="kpi-label">${t('kpiLabels')[n]}</div>` +
      sparkSvg(k.spark);
    grid.appendChild(el);
  });
}
function animateKpis() {
  if (state.kpiShown) return;
  state.kpiShown = true;
  $('#kpiGrid').classList.add('kpi-shown');
  const nums = $$('.kpi-num');
  if (RM()) { nums.forEach(el => { el.textContent = el.dataset.target; }); return; }
  const dur = 1200;
  const start = performance.now();
  const frame = (now) => {
    const p = Math.min(1, (now - start) / dur);
    const ease = 1 - Math.pow(1 - p, 3);
    nums.forEach(el => { el.textContent = Math.round(Number(el.dataset.target) * ease); });
    if (p < 1) requestAnimationFrame(frame);
  };
  requestAnimationFrame(frame);
}

/* ---------- التهيئة ---------- */
$('#langToggle').addEventListener('click', () => {
  state.lang = state.lang === 'ar' ? 'en' : 'ar';
  applyLang();
});
$('#ctaPipeline').addEventListener('click', () => {
  $('#pipeline-section').scrollIntoView({ behavior: RM() ? 'auto' : 'smooth' });
});
$('#btnStartTour').addEventListener('click', startTour);
$('#btnResetTour').addEventListener('click', resetTour);
$('#journeyPanel').addEventListener('click', (e) => {
  const btn = e.target.closest('[data-act]');
  if (!btn) return;
  if (btn.dataset.act === 'approve') approveStage();
  else returnStage();
});
$$('.valve-check').forEach(btn => {
  btn.addEventListener('click', () => {
    $('#valveResult' + btn.dataset.valve).classList.add('show');
  });
});
$('#btnRunTests').addEventListener('click', runTests);

const kpiObserver = new IntersectionObserver((entries) => {
  entries.forEach(en => {
    if (en.isIntersecting) { animateKpis(); kpiObserver.disconnect(); }
  });
}, { threshold: 0.3 });
kpiObserver.observe($('#kpis'));

/* دورة سطر النشاط في بطاقات التجارب — مؤقّت مستقل */
setInterval(() => {
  state.tickerIdx++;
  $$('.tk-text[data-cycle]').forEach(el => {
    const lines = t('tickers')[el.dataset.code];
    const next = lines[state.tickerIdx % lines.length];
    if (RM()) { el.textContent = next; return; }
    el.classList.add('fade');
    setTimeout(() => { el.textContent = next; el.classList.remove('fade'); }, 280);
  });
}, 3800);

/* ظهور الأقسام عند دخولها مجال الرؤية */
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach(en => {
    if (en.isIntersecting) { en.target.classList.add('in'); revealObserver.unobserve(en.target); }
  });
}, { threshold: 0.05 });
$$('section').forEach(s => { s.classList.add('reveal'); revealObserver.observe(s); });

applyLang();
</script>
